syntax = "proto3";

import "google/protobuf/timestamp.proto";


message User{

    string user_id = 1 ;

    string user_name = 2;

    string mobile_number =3 ;
    
    string email =4;

    string password_hash =5; 

    optional google.protobuf.Timestamp created_at = 6;

    optional google.protobuf.Timestamp updated_at = 7;



}
