syntax = "proto3";

import "google/protobuf/timestamp.proto";



message RegisterRequest{
    
    string user_name = 2;
    
    string mobile_number =3 ;
    
    string email =4;

    string password_hash =5; 



}

message RegisterResponse{
    
    bool success = 1;
    
    string message = 2;
}

message LoginRequest{
    
    string email = 1;
    
    string password = 2;
}

message LoginResponse{
    
    bool success = 1;
    
    string message = 2;
    
    string token = 3;
}
